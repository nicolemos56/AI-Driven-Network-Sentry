<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picket Officer NOC </title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>

    <style>
        body { background: #0b0e14; color: #e1e2eb; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(25, 28, 34, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Animação Estado Zumbi */
        .zombie-row { border-left: 4px solid #ff8a00 !important; animation: pulse-orange 2s infinite; }
        @keyframes pulse-orange { 
            0%, 100% { background: rgba(255,138,0,0.02); } 
            50% { background: rgba(255,138,0,0.08); } 
        }

        .status-up { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
        .status-down { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>

<body class="min-h-screen flex flex-col p-4 md:p-8 overflow-y-auto lg:overflow-hidden">
    
    <!-- Navbar Responsiva -->
    <nav class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
        <div class="flex items-center gap-3 w-full sm:w-auto">
            <h1 class="text-xl md:text-2xl font-black text-[#00f0ff] italic tracking-tighter uppercase">Picket Officer <span class="text-gray-600">AINOC</span></h1>
            <span class="hidden xs:block text-[8px] px-2 py-0.5 bg-[#00f0ff]/10 text-[#00f0ff] border border-[#00f0ff]/20 rounded font-black uppercase">AI Network Operations Center</span>
        </div>
        <div class="flex gap-2 w-full sm:w-auto justify-center">
            <button onclick="sim('portal')" class="flex-1 sm:flex-none bg-orange-600/10 text-orange-500 border border-orange-500/30 px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase hover:bg-orange-600 hover:text-white transition-all">Simular Portal Fail</button>
            <button onclick="sim('unknown')" class="flex-1 sm:flex-none bg-red-600/10 text-red-500 border border-red-600/30 px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase hover:bg-red-600 hover:text-white transition-all">Simular Unknown</button>
        </div>
    </nav>

    <div class="flex flex-col lg:flex-row gap-6 flex-1 h-full overflow-hidden">
        
        <!-- COLUNA ESQUERDA (DADOS E TELEMETRIA) -->
        <div class="flex-1 flex flex-col gap-6 overflow-y-auto lg:overflow-hidden min-w-0">
            
            <!-- Node Info Card (Ajustado para não quebrar texto) -->
            <div id="node-info" class="glass rounded-2xl md:rounded-3xl p-4 md:p-6 border border-[#00f0ff]/10">
                <!-- Preenchido via JS -->
            </div>
            
            <!-- Bloco do Gráfico (Altura fixa no Desktop, flexível no Mobile) -->
            <div class="glass rounded-2xl md:rounded-3xl p-4 md:p-6 border border-white/5 min-h-[300px] lg:flex-1 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-[9px] uppercase text-gray-500 font-black tracking-widest">Real-time Throughput (Kbps)</h3>
                    <span class="text-[8px] mono text-[#00f0ff]/50">Live SNMP</span>
                </div>
                <div class="flex-1 relative">
                    <canvas id="trafficChart"></canvas>
                </div>
            </div>
        </div>

        <!-- COLUNA DIREITA (AGENTE IA) -->
        <aside class="w-full lg:w-[400px] xl:w-[480px] glass rounded-2xl md:rounded-3xl border border-purple-500/20 flex flex-col overflow-hidden shadow-2xl shrink-0">
            <header class="p-4 md:p-6 bg-purple-500/10 border-b border-purple-500/20 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-purple-500 text-2xl">smart_toy</span>
                    <div>
                        <h2 class="font-bold text-purple-400 text-sm uppercase tracking-tighter">AI Agent</h2>
                        <p class="text-[8px] text-gray-500 font-mono uppercase">Sentinel Cognitive Core</p>
                    </div>
                </div>
                <div id="risk-badge"></div>
            </header>

            <div id="agent-content" class="flex-1 p-4 md:p-8 space-y-4 overflow-y-auto font-mono text-[10px] md:text-[11px]">
                <div class="flex flex-col items-center justify-center h-full text-gray-600 italic">
                    <span class="material-symbols-outlined text-3xl mb-2">sync</span>
                    <p>Aguardando telemetria...</p>
                </div>
            </div>

            <!-- Approval Center -->
            <div id="approval-area" class="p-4 md:p-6 bg-black/40 border-t border-white/5 hidden">
                <button onclick="approve()" class="w-full bg-[#00f0ff] text-black font-black py-4 rounded-xl text-xs uppercase tracking-widest hover:scale-[1.01] transition-all">
                    Autorizar Execução
                </button>
            </div>
        </aside>
    </div>

    <script>
        const API = "http://127.0.0.1:8000";
        let isHandling = false;
        let chart = null;

        function initChart() {
            const ctx = document.getElementById('trafficChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: Array(20).fill(''), datasets: [{
                    data: [], borderColor: '#00f0ff', borderWidth: 2, fill: true, backgroundColor: 'rgba(0, 240, 255, 0.05)', tension: 0.4, pointRadius: 0
                }]},
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
                    scales: { y: { grid: { color: 'rgba(255,255,255,0.02)' }, ticks: { color: '#444', font: { size: 9 } } }, x: { display: false } }
                }
            });
        }

        async function update() {
            try {
                const res = await fetch(`${API}/aps`);
                const aps = await res.json();
                const ap = aps[0];

                // Renderização com Tipografia Responsiva
                document.getElementById('node-info').innerHTML = `
                    <div class="flex flex-col sm:flex-row justify-between items-start gap-4 mb-6">
                        <div class="min-w-0">
                            <h2 class="text-xl md:text-3xl font-black text-white truncate uppercase">${ap.name}</h2>
                            <span class="text-[10px] text-[#00f0ff] mono bg-[#00f0ff]/5 px-2 py-0.5 rounded border border-[#00f0ff]/10">${ap.ip}</span>
                        </div>
                        <div class="sm:text-right w-full sm:w-auto p-2 sm:p-0 bg-white/5 sm:bg-transparent rounded-lg">
                            <span class="text-[8px] text-gray-500 uppercase font-black block">CPU Utilization</span>
                            <b class="text-xl md:text-2xl font-black text-[#00f0ff] mono">${ap.cpu_load}</b>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 md:gap-4">
                        <div class="p-3 md:p-4 glass rounded-xl border border-white/5">
                            <span class="text-[8px] text-gray-500 uppercase font-bold block mb-1">Network</span>
                            <b class="text-xs md:text-sm ${ap.zabbix_status === 'UP' ? 'text-green-400' : 'text-red-400'}">${ap.zabbix_status}</b>
                        </div>
                        <div class="p-3 md:p-4 glass rounded-xl border border-white/5">
                            <span class="text-[8px] text-gray-500 uppercase font-bold block mb-1">Service</span>
                            <b class="text-xs md:text-sm ${ap.portal_status === 'OK' ? 'text-green-400' : 'text-red-400'}">${ap.portal_status}</b>
                        </div>
                    </div>
                `;

                if(ap.portal_status === 'DOWN') document.getElementById('node-info').classList.add('zombie-row');
                else document.getElementById('node-info').classList.remove('zombie-row');

                const telRes = await fetch(`${API}/network-stats/2`);
                const telJson = await telRes.json();
                chart.data.datasets[0].data = telJson.data;
                chart.update('none');

                if((ap.portal_status === 'DOWN' || ap.zabbix_status === 'DOWN') && !isHandling) {
                    isHandling = true;
                    runAgent();
                } else if(ap.portal_status === 'OK' && ap.zabbix_status === 'UP') {
                    isHandling = false;
                    document.getElementById('approval-area').classList.add('hidden');
                    document.getElementById('risk-badge').innerHTML = '';
                }
            } catch (e) { }
        }

        async function runAgent() {
            const content = document.getElementById('agent-content');
            content.innerHTML = `<div class="flex flex-col items-center justify-center mt-20 text-purple-400 animate-pulse"><span class="material-symbols-outlined text-4xl mb-4">psychology</span><p class="text-[10px] font-black uppercase tracking-widest text-center">IA analisando impacto e risco...</p></div>`;

            try {
                const res = await fetch(`${API}/agent/decision`);
                const decision = await res.json();

                content.innerHTML = `
                    <div class="space-y-4">
                        <div class="p-4 rounded-xl border border-purple-500/30 bg-purple-500/5">
                            <span class="text-[8px] uppercase text-purple-400 font-black">Diagnóstico:</span>
                            <p class="text-xs font-bold text-white mt-1 leading-snug">${decision.diagnosis}</p>
                        </div>
                        <div class="p-4 rounded-xl bg-black/40 border border-white/5">
                            <span class="text-[8px] uppercase text-gray-500 font-black">Raciocínio:</span>
                            <p class="text-gray-400 mt-1 leading-relaxed text-[10px]">${decision.reasoning}</p>
                        </div>
                        <div class="p-3 rounded-lg bg-purple-500/10 border-l-4 border-purple-500">
                             <span class="text-[8px] uppercase font-black text-purple-400 block mb-1">Ação DevNet:</span>
                             <span class="text-white font-bold text-xs">${decision.suggested_action}</span>
                        </div>
                    </div>`;

                document.getElementById('risk-badge').innerHTML = `
                    <span class="px-2 py-0.5 rounded border ${decision.risk_level === 'HIGH' ? 'border-red-500 text-red-500' : 'border-purple-500 text-purple-500'} text-[8px] font-black uppercase">
                        ${decision.risk_level} Risk
                    </span>`;

                if(decision.requires_approval) document.getElementById('approval-area').classList.remove('hidden');
                else setTimeout(() => approve(), 3000);
            } catch (e) { content.innerHTML = "Erro de conexão com o agente."; }
        }

        async function approve() {
            await fetch(`${API}/action/execute/2`, { method: 'POST' });
            document.getElementById('approval-area').classList.add('hidden');
            document.getElementById('agent-content').innerHTML = `<div class="p-6 text-center text-green-400 font-bold border border-green-500/20 bg-green-500/5 rounded-2xl">✅ SISTEMA RESTAURADO</div>`;
            setTimeout(() => { isHandling = false; update(); }, 2000);
        }

        async function sim(type) {
            await fetch(`${API}/simulate/${type}`, { method: 'POST' });
            update();
        }

        window.onload = () => { initChart(); update(); setInterval(update, 3000); };
    </script>
</body>
</html>
